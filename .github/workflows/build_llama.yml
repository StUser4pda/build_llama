name: Build llama.cpp (Windows x64 — RTX 20xx)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CUDA_VERSION:     "12.6.3"
  CUDA_ARCH:        "75"
  CMAKE_BUILD_TYPE: "Release"
  CMAKE_GENERATOR:  "Ninja"
  BUILD_DIR:        "build"

jobs:

  build-cuda:
    name: "llama.cpp · All CPU Variants · CUDA sm_75"
    runs-on: windows-latest

    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: master
          submodules: recursive

      - name: Install CUDA Toolkit ${{ env.CUDA_VERSION }}
        uses: Jimver/cuda-toolkit@master
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust"]'

      - name: Install Ninja
        run: choco install ninja --no-progress -y

      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure (CUDA sm_75)
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} `
            -G "${{ env.CMAKE_GENERATOR }}" `
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} `
            -DGGML_CUDA=ON `
            -DGGML_CPU_ALL_VARIANTS=ON `
            -DCMAKE_CUDA_ARCHITECTURES="${{ env.CUDA_ARCH }}" `
            -DCMAKE_CXX_FLAGS="/fp:fast" `
            -DCMAKE_C_FLAGS="/fp:fast" `
            -DCMAKE_CXX_FLAGS_RELEASE="/O2 /Ob2 /DNDEBUG" `
            -DCMAKE_C_FLAGS_RELEASE="/O2 /Ob2 /DNDEBUG" `
            -DCMAKE_CUDA_FLAGS="--use_fast_math --expt-relaxed-constexpr -Xcompiler=/fp:fast" `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_CURL=OFF `
            -DLLAMA_SSL=OFF

      - name: Build (CUDA sm_75)
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

      - name: Collect binaries
        shell: pwsh
        run: |
          $out = "dist\llama-cpp-cuda-sm75-win-x64"
          New-Item -ItemType Directory -Force $out | Out-Null
          Get-ChildItem -Recurse ${{ env.BUILD_DIR }} -Include "*.exe","*.dll" |
            Where-Object { $_.DirectoryName -notmatch "CMakeFiles" } |
            Copy-Item -Destination $out -Force


      - name: Upload artefact (CUDA sm_75)
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-cuda-sm75-win-x64
          path: dist\llama-cpp-cuda-sm75-win-x64\
          retention-days: 30
