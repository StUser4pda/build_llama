name: Build llama.cpp (Windows x64 — RTX 20xx + avx512vnni)

on:
  workflow_dispatch:

env:
  CUDA_VERSION:     "12.6.3"
  CUDA_ARCH:        "75"
  CMAKE_BUILD_TYPE: "Release"
  CMAKE_GENERATOR:  "Ninja"
  BUILD_DIR:        "build"

jobs:
  # ===========================================================================
  # CPU AVX512_VNNI · CUDA sm_75 (RTX 20xx)
  # ===========================================================================
  build-allvariants-cuda:
    name: "llama.cpp · CPU AVX512_VNNI · CUDA sm_75"
    runs-on: windows-2022

    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: master
          submodules: recursive

      - name: Install CUDA Toolkit ${{ env.CUDA_VERSION }}
        uses: Jimver/cuda-toolkit@master
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust"]'

      - name: Install Ninja
        run: choco install ninja --no-progress -y

      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install OpenSSL (static) via vcpkg
        run: |
          vcpkg install openssl:x64-windows-static
          echo "OPENSSL_ROOT_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static" >> $env:GITHUB_ENV

      - name: Configure (All CPU Variants · CUDA sm_75)
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} `
            -G "${{ env.CMAKE_GENERATOR }}" `
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DGGML_CUDA=ON `
            -DGGML_BACKEND_DL=OFF `
            -DGGML_SSE42=ON `
            -DGGML_AVX=ON `
            -DGGML_F16C=ON `
            -DGGML_FMA=ON `
            -DGGML_AVX2=ON `
            -DGGML_BMI2=ON `
            -DGGML_AVX512=ON `
            -DGGML_AVX512_VBMI=ON `
            -DGGML_AVX512_VNNI=ON `
            -DGGML_NATIVE=OFF `
            -DGGML_LTO=ON `
            -DCMAKE_CXX_FLAGS_RELEASE="/O2 /Ob3 /DNDEBUG /GL /Oi /Ot /GS- /fp:fast" `
            -DCMAKE_C_FLAGS_RELEASE="/O2 /Ob3 /DNDEBUG /GL /Oi /Ot /GS- /fp:fast" `
            -DCMAKE_EXE_LINKER_FLAGS_RELEASE="/LTCG /OPT:REF /OPT:ICF" `
            -DCMAKE_SHARED_LINKER_FLAGS_RELEASE="/LTCG /OPT:REF /OPT:ICF" `
            -DCMAKE_CUDA_FLAGS="-O3 --use_fast_math -Xptxas=-O3,--warn-on-spills" `            
            -DCMAKE_CUDA_ARCHITECTURES="${{ env.CUDA_ARCH }}" `
            -DOPENSSL_USE_STATIC_LIBS=TRUE `
            -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR" `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_CURL=OFF `
            -DLLAMA_SSL=OFF

      - name: Build (CPU AVX512_VNNI · CUDA sm_75)
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.CMAKE_BUILD_TYPE }} --parallel

      - name: Collect binaries
        shell: pwsh
        run: |
          $out = "dist\llama-cpp-avx512vnni-cuda-sm75-win-x64"
          New-Item -ItemType Directory -Force $out | Out-Null
          Get-ChildItem -Recurse ${{ env.BUILD_DIR }} -Include "*.exe","*.dll" |
            Where-Object { $_.DirectoryName -notmatch "CMakeFiles" } |
            Copy-Item -Destination $out -Force

      - name: Upload artefact (CPU AVX512_VNNI · CUDA sm_75)
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-avx512vnni-cuda-sm75-win-x64
          path: dist\llama-cpp-avx512vnni-cuda-sm75-win-x64\
          retention-days: 30
