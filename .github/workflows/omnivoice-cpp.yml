name: Build omnivoice.cpp

on:
  workflow_dispatch:

env:
  CUDA_VERSION: "12.6.3"

jobs:
  build-allvariants-cuda:
    name: "omnivoice.cpp build"
    runs-on: windows-2022

    steps:
      - name: Checkout omnivoice.cpp
        uses: actions/checkout@v4
        with:
          repository: ServeurpersoCom/omnivoice.cpp
          ref: master
          submodules: recursive

      - name: Install CUDA Toolkit ${{ env.CUDA_VERSION }}
        uses: Jimver/cuda-toolkit@master
        id: cuda-toolkit
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust"]'

      - name: Diagnose CUDA install
        shell: cmd
        run: |
          echo === CUDA root ===
          dir "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.6\"
          echo === extras ===
          dir "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.6\extras\" 2>nul || echo "No extras folder"
          echo === cuda-toolkit action output ===
          echo CUDA_PATH=%CUDA_PATH%
          echo CUDA_PATH_V12_6=%CUDA_PATH_V12_6%
          
      - name: Build
        continue-on-error: true
        run: ./buildall.cmd

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: omnivoice-cpp
          path: build
          retention-days: 30
